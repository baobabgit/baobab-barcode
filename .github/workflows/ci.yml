# Qualité release : aligné sur pyproject.toml, Makefile (quality) et README (quality gates).
# Déclenché uniquement par push d’un tag de version (préfixe v, ex. v0.1.0).
# Pas de publication PyPI (workflow séparé si besoin).

name: CI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install native library (zbar, for pyzbar tests)
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - name: Install project (editable, dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (coverage thresholds in pyproject.toml)
        run: python -m pytest

      - name: Black (check)
        run: python -m black --check src tests

      - name: Pylint
        run: python -m pylint src tests

      - name: Mypy
        run: python -m mypy

      - name: Flake8
        run: python -m flake8 src tests

      - name: Bandit
        run: python -m bandit -c pyproject.toml -r src

      - name: Build package (wheel + sdist)
        run: python -m build
